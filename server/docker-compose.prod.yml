services: 
  mongo:
    image: mongo:7
    container_name: reyu_mongo_prod
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_reyu_prod:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  reyu_server:
    build:
      context: ./src
      dockerfile: Dockerfile
      target: production
    container_name: reyu_server_prod
    # Env variables only, no volume mapping
    env_file:
      - ./src/.env
    ports: 
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

volumes:
  mongo_data_reyu_prod:
